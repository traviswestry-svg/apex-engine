<!doctype html><html><head><meta charset="utf-8"><title>APEX Institutional Research Lab</title><style>body{font-family:Arial;background:#0b1020;color:#eef2ff;margin:0;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.card{background:#151c33;border:1px solid #2a355d;border-radius:12px;padding:18px}h1{margin-top:0}.value{font-size:28px;font-weight:700}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #2a355d;text-align:left}</style></head><body><h1>Institutional Research Lab &amp; Alpha Attribution</h1><p>Offline candidate research, immutable experiment results, promotion-readiness gates, and descriptive subsystem attribution. Production decisions remain unchanged.</p><div class="grid" id="summary"></div><div class="card" style="margin-top:14px"><h2>Research Candidates</h2><table><thead><tr><th>Name</th><th>Type</th><th>Stage</th><th>Owner</th></tr></thead><tbody id="rows"></tbody></table></div><div class="card" style="margin-top:14px"><h2>Recent Alpha Attribution</h2><div id="alpha"></div></div><script>fetch('/api/research-lab/dashboard').then(r=>r.json()).then(d=>{const s=d.safety||{};summary.innerHTML=[['Candidates',(d.candidates||[]).length],['Research Runs',(d.recent_runs||[]).length],['Attributions',(d.attributions||[]).length],['Production Effect',s.production_effect]].map(x=>`<div class="card"><div>${x[0]}</div><div class="value">${x[1]}</div></div>`).join('');rows.innerHTML=(d.candidates||[]).map(x=>`<tr><td>${x.name}</td><td>${x.candidate_type}</td><td>${x.stage}</td><td>${x.owner}</td></tr>`).join('');alpha.innerHTML=(d.attributions||[]).map(x=>`<p><b>${x.scope_id}</b>: ${Object.entries(x.normalized||{}).map(([k,v])=>`${k} ${v}%`).join(' · ')}</p>`).join('')||'No attribution records yet.'})</script></body></html>
