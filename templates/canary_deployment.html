<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX Canary Deployment</title><style>body{font-family:Arial,sans-serif;background:#0b1020;color:#e8edf7;margin:0;padding:24px}.wrap{max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.card{background:#151c31;border:1px solid #2a3555;border-radius:12px;padding:18px}.muted{color:#9ba8c5}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid #2a3555}.badge{padding:6px 10px;border-radius:999px;background:#303b5f}</style></head><body><main class="wrap"><h1>Canary Deployment Controller</h1><p class="muted">Human-started, maximum 10% challenger exposure with automatic restoration of the recorded champion.</p><section class="grid"><div class="card"><small>Controller</small><h2 id="status">—</h2></div><div class="card"><small>Active Canaries</small><h2 id="active">—</h2></div><div class="card"><small>Maximum Exposure</small><h2>10%</h2></div><div class="card"><small>Automatic Full Rollout</small><h2>DISABLED</h2></div></section><section class="card" style="margin-top:14px"><h2>Canary Registry</h2><div style="overflow:auto"><table><thead><tr><th>Created</th><th>Status</th><th>Champion</th><th>Challenger</th><th>Exposure</th></tr></thead><tbody id="body"></tbody></table></div></section></main><script>async function load(){const s=await fetch('/api/production/canary/status').then(r=>r.json());const p=await fetch('/api/production/canaries').then(r=>r.json());document.getElementById('status').textContent=s.status||'READY';document.getElementById('active').textContent=s.active_count||0;document.getElementById('body').innerHTML=(p.canaries||[]).map(x=>`<tr><td>${x.created_at}</td><td><span class="badge">${x.status}</span></td><td>${x.champion_version}</td><td>${x.challenger_version}</td><td>${x.exposure_pct}%</td></tr>`).join('')||'<tr><td colspan="5">No canary deployments.</td></tr>'}load();</script></body></html>
