<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX Institutional Intelligence</title><style>body{font-family:Arial;background:#081018;color:#e9f1f7;margin:0;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}.card{background:#111c27;border:1px solid #263747;border-radius:12px;padding:18px}.muted{color:#93a7b8}.score{font-size:36px;font-weight:700}h1,h2{margin-top:0}.bad{color:#ffb4b4}.good{color:#a7f3d0}</style></head><body><h1>APEX Institutional Intelligence 11.2–11.3</h1><p class="muted">Deterministic narrative, consensus, conviction and replay. Live guidance fails closed.</p><div id="root" class="grid"><div class="card">Loading normalized institutional state…</div></div><script>
async function load(){const r=await fetch('/api/institutional-decision');const d=await r.json();const n=d.narrative||{},c=d.consensus||{},v=d.conviction||{};document.getElementById('root').innerHTML=`<section class="card"><h2>Executive Summary</h2><p>${n.executive_summary||'Unavailable'}</p><p class="${d.fail_closed?'bad':'good'}">${d.fail_closed?'FAIL CLOSED':'LIVE GUIDANCE ENABLED'}</p></section><section class="card"><h2>Consensus</h2><div class="score">${c.score??0}</div><p>${c.direction||'NEUTRAL'} · conflict ${c.conflict_score??0}</p></section><section class="card"><h2>Conviction</h2><div class="score">${v.score??0}</div><p>${v.band||'UNAVAILABLE'}</p></section><section class="card"><h2>Primary Thesis</h2><p>${n.primary_thesis||'Unavailable'}</p><h2>Alternate Thesis</h2><p>${n.alternate_thesis||'Unavailable'}</p></section><section class="card"><h2>Risks</h2><ul>${(n.risk_drivers||[]).map(x=>`<li>${x}</li>`).join('')}</ul></section><section class="card"><h2>Invalidations</h2><ul>${(n.invalidation_conditions||[]).map(x=>`<li>${x.condition}</li>`).join('')||'<li>No validated levels supplied.</li>'}</ul></section>`}load().catch(e=>document.getElementById('root').innerHTML='<div class="card bad">Institutional intelligence unavailable.</div>');</script></body></html>
