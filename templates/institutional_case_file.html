<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX Institutional Case File</title><style>body{margin:0;background:#07111f;color:#e8eef8;font:14px system-ui}.wrap{max-width:1400px;margin:auto;padding:24px}.hero,.card{background:#0d1b2d;border:1px solid #223653;border-radius:14px;padding:18px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}.muted{color:#8fa6c4}.badge{padding:5px 9px;border-radius:999px;background:#18304e}.event{border-left:2px solid #456a9e;padding:0 0 18px 16px;margin-left:7px}pre{white-space:pre-wrap;word-break:break-word;background:#081421;padding:12px;border-radius:10px}</style></head><body><div class="wrap"><div class="hero"><div class="muted">APEX 13.0 · Immutable Institutional Evidence</div><h1>Institutional Case File</h1><span id="status" class="badge">LOADING</span><p id="rid"></p></div><div id="summary" class="grid"></div><div class="card"><h2>Recommendation Evolution Timeline</h2><div id="timeline"></div></div><div class="card"><h2>Evidence Package</h2><pre id="raw"></pre></div></div><script>const id={{ recommendation_id|tojson }};document.getElementById('rid').textContent=id;Promise.all([fetch('/api/evidence/'+id).then(r=>r.json()),fetch('/api/evidence/'+id+'/timeline').then(r=>r.json())]).then(([p,t])=>{document.getElementById('status').textContent=p.status||'UNAVAILABLE';const d=(p.package||{}).canonical_decision||{};document.getElementById('summary').innerHTML=['strategy','ticker','status','confidence'].map(k=>`<div class="card"><div class="muted">${k.toUpperCase()}</div><h3>${d[k]??'UNAVAILABLE'}</h3></div>`).join('');document.getElementById('timeline').innerHTML=(t.events||[]).map(e=>`<div class="event"><b>${e.event_type}</b><div class="muted">${e.timestamp} · ${e.source}</div><p>${e.explanation||''}</p></div>`).join('')||'<p class="muted">No timeline events captured.</p>';document.getElementById('raw').textContent=JSON.stringify(p.package||p,null,2)}).catch(()=>document.getElementById('status').textContent='UNAVAILABLE')</script></body></html>
