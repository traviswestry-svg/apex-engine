<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX Institutional Data Quality</title><style>body{font-family:Arial;background:#07111f;color:#e7edf7;margin:0;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}.card{background:#0e1c2e;border:1px solid #263b55;border-radius:12px;padding:18px}.muted{color:#91a4bb}.pill{display:inline-block;padding:4px 8px;border:1px solid #50647c;border-radius:20px}pre{white-space:pre-wrap;word-break:break-word}</style></head><body><div style="display:flex;justify-content:space-between;align-items:center"><div><h1>Institutional Data Quality</h1><p class="muted">Historical evidence contamination guard. Missing or stale inputs fail closed.</p></div><span id="dq-status" class="pill">LOADING</span></div><div class="grid"><div class="card"><small>Evidence packages</small><h2 id="dq-total">—</h2></div><div class="card"><small>Assessed</small><h2 id="dq-assessed">—</h2></div><div class="card"><small>Research eligible</small><h2 id="dq-eligible">—</h2></div><div class="card"><small>Excluded</small><h2 id="dq-excluded">—</h2></div><div class="card"><h2>Quality Grades</h2><pre id="dq-grades">No assessments yet.</pre></div><div class="card"><h2>Detected Defects</h2><pre id="dq-defects">No defects recorded.</pre></div></div><script>fetch('/api/data-quality/status').then(r=>r.json()).then(d=>{document.getElementById('dq-status').textContent=d.status;document.getElementById('dq-total').textContent=d.evidence_packages;document.getElementById('dq-assessed').textContent=d.assessed;document.getElementById('dq-eligible').textContent=d.eligible;document.getElementById('dq-excluded').textContent=d.excluded;document.getElementById('dq-grades').textContent=JSON.stringify(d.grades,null,2);document.getElementById('dq-defects').textContent=JSON.stringify(d.defect_counts,null,2);}).catch(()=>document.getElementById('dq-status').textContent='UNAVAILABLE');</script></body></html>
