<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX Live Mission Control</title><style>body{font-family:Arial;background:#07101d;color:#e8eef7;margin:0;padding:20px}.top{display:flex;justify-content:space-between;align-items:end}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;margin-top:16px}.card{background:#111d2e;border:1px solid #293b57;border-radius:12px;padding:16px}.kpi{grid-column:span 3}.wide{grid-column:span 6}.full{grid-column:1/-1}.hero{font-size:38px;font-weight:800}.muted{color:#9db0c9}.grade{font-size:28px;font-weight:800}table{width:100%;border-collapse:collapse}td,th{padding:7px;border-bottom:1px solid #263850;text-align:left}@media(max-width:900px){.kpi,.wide{grid-column:1/-1}}</style></head><body><div class="top"><div><h1>APEX 16.5 — Live Mission Control</h1><div class="muted">Institutional Trading Desk • SPX Command Surface</div></div><div id="status" class="muted">Loading…</div></div><div id="root" class="grid"></div><script>
const val=(x,f='—')=>x===undefined||x===null||x===''?f:x;
async function load(){let d=await fetch('/api/mission-control/dashboard?symbol=SPX').then(r=>r.json());let p=d.institutional_pressure||{},m=d.market_state||{},b=d.playbook||{},c=d.institutional_confluence||{},pm=d.position_monitor||{},br=d.briefing||{};document.getElementById('status').textContent=d.status;
let h=`<div class="card kpi"><div class="muted">Institutional Confluence</div><div class="hero">${val(c.institutional_confluence_score)}</div><div class="grade">${val(c.grade)}</div></div>`;
h+=`<div class="card kpi"><div class="muted">Institutional Pressure</div><div class="hero">${val(p.institutional_pressure_score)}</div><div>${val(p.bias,'COLLECTING')}</div></div>`;
h+=`<div class="card kpi"><div class="muted">Market State</div><div class="grade">${val(m.active_state)}</div><div class="muted">Stability ${val(m.stability||m.stability_index)}</div></div>`;
h+=`<div class="card kpi"><div class="muted">Active Playbook</div><div class="grade">${val(b.active_playbook)}</div><div class="muted">PQS ${val(b.playbook_quality_score||b.pqs)}</div></div>`;
h+=`<div class="card wide"><h3>Institutional Briefing</h3><h2>${val(br.headline)}</h2><p>${val(br.market_read)}</p><p><b>Directive:</b> ${val(br.directive)}</p><p><b>Invalidation:</b> ${val(br.primary_invalidation)}</p></div>`;
h+=`<div class="card wide"><h3>Live Position Monitor</h3><div class="hero" style="font-size:26px">${val(pm.status)}</div><p>Unrealized P&amp;L: ${val(pm.unrealized_pnl)}</p><p>Remaining edge: ${val(pm.remaining_edge)}</p><p class="muted">Advisory only • No broker mutation</p></div>`;
h+=`<div class="card full"><h3>Confluence Components</h3><table><tr><th>Engine</th><th>Score</th><th>Weight</th><th>Available</th></tr>${(c.components||[]).map(x=>`<tr><td>${x.name}</td><td>${x.score}</td><td>${Math.round(x.weight*100)}%</td><td>${x.available?'Yes':'No'}</td></tr>`).join('')}</table></div>`;
document.getElementById('root').innerHTML=h}load();setInterval(load,15000)</script>
<script>
(async()=>{try{const d=await fetch('/api/broker-sync/dashboard?account_id=PRIMARY&broker=ETRADE').then(r=>r.json());const x=d.latest||{};let h=document.getElementById('broker-synchronized-state');if(!h){h=document.createElement('section');h.id='broker-synchronized-state';document.body.appendChild(h);}const snap=x.broker_snapshot||{};const acct=snap.account||{};const ds=x.discrepancies||[];h.innerHTML=`<h2>Broker-Synchronized Position State</h2><p><b>Broker:</b> ${snap.broker||'ETRADE'} &nbsp; <b>Sync:</b> ${x.sync_state||'BROKER_UNAVAILABLE'} &nbsp; <b>Mode:</b> Read Only</p><p><b>Account Value:</b> ${acct.account_value??'—'} &nbsp; <b>Buying Power:</b> ${acct.buying_power??'—'} &nbsp; <b>Positions:</b> ${x.position_count??0} &nbsp; <b>Open Orders:</b> ${x.open_order_count??0}</p>${ds.length?`<h3>Reconciliation Issues</h3><ul>${ds.map(v=>`<li><b>${v.severity}</b> — ${v.type}${v.symbol?` (${v.symbol})`:''}</li>`).join('')}</ul>`:'<p>No broker snapshot recorded yet.</p>'}<small>No broker order submission, cancellation, replacement, or position mutation.</small>`;}catch(e){}})();
</script>

<script>
(async()=>{try{const d=await fetch('/api/autonomous-desk/dashboard').then(r=>r.json());let h=document.getElementById('institutional-autonomous-desk');if(!h){h=document.createElement('section');h.id='institutional-autonomous-desk';document.body.appendChild(h);}const sf=d.safety||{};const xs=d.active_trades||[];h.innerHTML=`<h2>17.0 Institutional Autonomous Desk</h2><p><b>Status:</b> ${d.status||'UNAVAILABLE'} &nbsp; <b>Active Lifecycles:</b> ${xs.length} &nbsp; <b>Human Confirmation:</b> ${sf.human_confirmation_required?'REQUIRED':'UNKNOWN'}</p><p>Observe → validate → preview → confirm → submit → manage → reconcile → grade.</p>${xs.length?`<ul>${xs.slice(0,6).map(x=>`<li><b>${x.state}</b> — ${x.symbol||'SPX'} ${x.strategy||''}</li>`).join('')}</ul>`:'<p>No governed trade lifecycles are active.</p>'}<small>Automatic broker submission remains disabled. The desk orchestrates evidence and state; it does not bypass the confirmation gate.</small>`;}catch(e){}})();

</body></html>

<script>
(async()=>{try{
  let host=document.getElementById('explainable-intelligence-assistant');
  if(!host){host=document.createElement('section');host.id='explainable-intelligence-assistant';document.body.appendChild(host);}
  host.innerHTML=`<h2>Explainable Intelligence Assistant</h2>
  <p>Ask why confidence changed, why an action is active, what changed, what invalidated the thesis, or request similar sessions.</p>
  <input id="eia-question" style="width:70%" placeholder="Why is confidence changing?" />
  <button id="eia-ask">Ask APEX</button><div id="eia-answer"></div>
  <small>Evidence-grounded only. No recommendation, confidence, risk, position, or broker mutation.</small>`;
  document.getElementById('eia-ask').onclick=async()=>{
    const q=document.getElementById('eia-question').value;
    const d=await fetch('/api/explainable-intelligence/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:'SPX',question:q})}).then(r=>r.json());
    const cites=(d.citations||[]).slice(0,8).map(x=>`<li><b>${x.source}.${x.metric}</b>: ${JSON.stringify(x.value)}</li>`).join('');
    document.getElementById('eia-answer').innerHTML=`<p><b>${d.intent||'EVIDENCE_SUMMARY'}</b></p><p>${d.answer||'Evidence Not Available'}</p><ul>${cites}</ul>`;
  };
}catch(e){}})();
</script>
