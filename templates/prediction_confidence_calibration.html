<!doctype html><html><head><meta charset="utf-8"><title>APEX Confidence Calibration</title><style>body{font-family:Arial;background:#08111f;color:#e8eef8;margin:0;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.card{background:#101d2f;border:1px solid #263a55;border-radius:12px;padding:18px}h1{margin-top:0}.value{font-size:30px;font-weight:700}.muted{color:#9fb0c7}table{width:100%;border-collapse:collapse}td,th{padding:9px;border-bottom:1px solid #263a55;text-align:left}</style></head><body><h1>Prediction & Confidence Calibration</h1><p class="muted">Offline reliability research. Production confidence is never changed automatically.</p><div id="cards" class="grid"></div><div class="card" style="margin-top:14px"><h2>Reliability Curve</h2><table><thead><tr><th>Confidence Bin</th><th>N</th><th>Mean Predicted</th><th>Observed</th><th>Gap</th></tr></thead><tbody id="bins"></tbody></table></div><script>fetch('/api/calibration/dashboard').then(r=>r.json()).then(d=>{const a=d.current_analysis,m=a.metrics;document.querySelector('#cards').innerHTML=[['Samples',m.sample_size],['Mean Confidence',m.mean_confidence+'%'],['Observed Success',m.observed_success_rate+'%'],['Brier Score',m.brier_score],['ECE',m.expected_calibration_error],['Status',a.status]].map(x=>`<div class="card"><div class="muted">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('');document.querySelector('#bins').innerHTML=a.reliability_bins.map(b=>`<tr><td>${b.lower}-${b.upper}%</td><td>${b.sample_size}</td><td>${b.mean_predicted}%</td><td>${b.observed_success_rate}%</td><td>${b.calibration_gap}%</td></tr>`).join('')}).catch(e=>document.body.insertAdjacentHTML('beforeend','<p>Calibration data unavailable.</p>'));</script></body></html>
