<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX Shadow Validation</title><style>body{font-family:Arial,sans-serif;background:#0b1020;color:#e8edf7;margin:0;padding:24px}.wrap{max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.card{background:#151c31;border:1px solid #2a3555;border-radius:12px;padding:18px}.muted{color:#9ba8c5}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid #2a3555}.badge{padding:6px 10px;border-radius:999px;background:#303b5f}</style></head><body><main class="wrap"><h1>Shadow Validation Command Center</h1><p class="muted">Champion–challenger validation using live shadow evidence. Production effect: NONE.</p><section class="grid"><div class="card"><small>Campaigns</small><h2 id="campaigns">—</h2></div><div class="card"><small>Active / Paused</small><h2 id="active">—</h2></div><div class="card"><small>Review Packages</small><h2 id="packages">—</h2></div><div class="card"><small>Automatic Promotion</small><h2>DISABLED</h2></div></section><section class="card" style="margin-top:14px"><h2>Campaign Registry</h2><div style="overflow:auto"><table><thead><tr><th>Created</th><th>Status</th><th>Candidate</th><th>Champion</th><th>Kill Switch</th></tr></thead><tbody id="body"></tbody></table></div></section></main><script>async function load(){const c=await fetch('/api/learning/shadow-campaigns').then(r=>r.json());const p=await fetch('/api/learning/promotion-packages').then(r=>r.json());const rows=c.campaigns||[];document.getElementById('campaigns').textContent=rows.length;document.getElementById('active').textContent=rows.filter(x=>['ACTIVE','PAUSED'].includes(x.status)).length;document.getElementById('packages').textContent=(p.packages||[]).length;document.getElementById('body').innerHTML=rows.map(x=>`<tr><td>${x.created_at}</td><td><span class="badge">${x.status}</span></td><td>${x.candidate_id}</td><td>${x.champion_version}</td><td>${x.kill_switch_reason||'—'}</td></tr>`).join('')||'<tr><td colspan="5">No campaigns yet.</td></tr>'}load();</script></body></html>
