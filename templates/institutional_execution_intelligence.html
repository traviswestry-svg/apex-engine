<!doctype html><html><head><meta charset="utf-8"><title>APEX Institutional Execution Intelligence</title><style>body{font-family:Arial;background:#0b1020;color:#eef2ff;margin:0;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.card{background:#151c33;border:1px solid #2a355d;border-radius:12px;padding:18px}h1{margin-top:0}.value{font-size:28px;font-weight:700}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #2a355d;text-align:left}</style></head><body><h1>Institutional Execution Intelligence</h1><p>Offline, immutable analysis of completed trade execution. No live broker behavior is changed.</p><div class="grid" id="summary"></div><div class="card" style="margin-top:14px"><h2>Recent Executions</h2><table><thead><tr><th>Trade</th><th>Net P&amp;L</th><th>Capture</th><th>Quality</th><th>Mistakes</th></tr></thead><tbody id="rows"></tbody></table></div><script>fetch('/api/execution-intelligence/dashboard').then(r=>r.json()).then(d=>{const m=d.summary.metrics||{};summary.innerHTML=[['Sample',m.sample_size],['Win Rate',m.win_rate+'%'],['Net P&L','$'+m.net_pnl],['Avg Capture',m.average_profit_capture_pct+'%'],['Avg Quality',m.average_execution_quality_score],['Mistakes',m.total_execution_mistakes]].map(x=>`<div class="card"><div>${x[0]}</div><div class="value">${x[1]}</div></div>`).join('');rows.innerHTML=(d.recent_trades||[]).map(x=>`<tr><td>${x.trade_id}</td><td>$${x.metrics.net_pnl}</td><td>${x.metrics.profit_capture_pct}%</td><td>${x.diagnostics.execution_quality_score}</td><td>${(x.diagnostics.mistakes||[]).join(', ')||'None'}</td></tr>`).join('')})</script></body></html>
