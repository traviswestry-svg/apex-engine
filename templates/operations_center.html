<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>APEX Operations Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07101f;--panel:#0d182b;--panel2:#111f35;--line:#243451;--text:#e7eefb;--muted:#8fa1bd;--green:#3ddc97;--amber:#f6c453;--red:#ff6b78;--blue:#55b8ff;--gray:#718096}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px Inter,sans-serif}.mono{font-family:"JetBrains Mono",monospace}
.top{height:58px;display:flex;align-items:center;gap:22px;padding:0 22px;border-bottom:1px solid var(--line);background:#091426;position:sticky;top:0;z-index:10}.logo{font:800 18px "JetBrains Mono";color:#fff;text-decoration:none}.top a{color:var(--muted);text-decoration:none}.top a.active{color:var(--blue);font-weight:700}.spacer{flex:1}.wrap{max-width:1500px;margin:auto;padding:22px}.hero{display:flex;align-items:end;gap:18px;flex-wrap:wrap;margin-bottom:18px}.hero h1{margin:0;font-size:28px}.hero p{margin:5px 0 0;color:var(--muted)}.overall{margin-left:auto;padding:8px 13px;border:1px solid var(--line);border-radius:8px;font-weight:800}
.tabs{display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:16px}.tab{border:0;background:none;color:var(--muted);padding:11px 13px;cursor:pointer;font-weight:700}.tab.active{color:var(--blue);border-bottom:2px solid var(--blue)}.pane{display:none}.pane.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin:0}.desc{color:var(--muted);line-height:1.45;margin-top:9px}.badge{font:700 11px "JetBrains Mono";padding:4px 8px;border-radius:999px;border:1px solid}.PASS{color:var(--green)}.WARN,.BLOCKED{color:var(--amber)}.FAIL{color:var(--red)}.DISABLED{color:var(--gray)}
.controls{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px}input,select{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:9px 11px;border-radius:7px}input{min-width:280px}.btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 11px;border-radius:7px;cursor:pointer}.btn:hover{border-color:var(--blue)}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);font-size:12px}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);position:sticky;top:58px;background:#0b1729}code{color:#c9e7ff}.method{font-weight:800;color:var(--blue)}.metric{font:800 28px "JetBrains Mono"}.metric-label{color:var(--muted);margin-top:4px}.empty{padding:35px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:10px}.json{white-space:pre-wrap;max-height:480px;overflow:auto;background:#050b15;padding:13px;border-radius:8px;color:#bad4f4;font:12px "JetBrains Mono"}
@media(max-width:700px){.wrap{padding:14px}.top{padding:0 12px;gap:12px;overflow:auto}.hero{align-items:start}.overall{margin-left:0}input{min-width:100%;width:100%}.table-wrap{overflow:auto}}
</style>
</head>
<body>
<nav class="top"><a class="logo" href="/">APEX</a><a href="/apex_os">Terminal</a><a href="/apex_os/trade_command">Trade Command</a><a class="active" href="/apex_os/operations">Operations</a><span class="spacer"></span><span class="mono" id="clock">—</span></nav>
<main class="wrap">
<section class="hero"><div><h1>Operations Center</h1><p>System health, API inventory, data readiness, diagnostics, and release visibility.</p></div><div id="overall" class="overall mono">LOADING</div></section>
<div class="tabs">
<button class="tab active" data-pane="health">System Health</button><button class="tab" data-pane="endpoints">API Explorer</button><button class="tab" data-pane="ledger">Recommendation Ledger</button><button class="tab" data-pane="calibration">Calibration Readiness</button><button class="tab" data-pane="diagnostics">Diagnostics</button><button class="tab" data-pane="release">Release & Architecture</button>
</div>
<section class="pane active" id="health"><div class="grid" id="healthGrid"></div></section>
<section class="pane" id="endpoints"><div class="controls"><input id="endpointSearch" placeholder="Search route or handler"><select id="category"><option value="">All categories</option></select><button class="btn" id="refreshEndpoints">Refresh</button></div><div class="table-wrap"><table><thead><tr><th>Method</th><th>Route</th><th>Category</th><th>Handler</th><th>Action</th></tr></thead><tbody id="endpointRows"></tbody></table></div></section>
<section class="pane" id="ledger"><div id="ledgerContent" class="empty">Checking recommendation-ledger availability…</div></section>
<section class="pane" id="calibration"><div id="calibrationContent" class="empty">Checking calibration readiness…</div></section>
<section class="pane" id="diagnostics"><div class="grid" id="diagnosticGrid"></div></section>
<section class="pane" id="release"><div class="grid" id="releaseGrid"></div></section>
</main>
<script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function json(url){const r=await fetch(url);let b={};try{b=await r.json()}catch(e){b={error:'Invalid JSON'}}return {status:r.status,body:b};}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{timeZone:'America/New_York'})+' ET'}tick();setInterval(tick,1000);
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.pane').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.pane).classList.add('active')});
async function loadHealth(){const {body}=await json('/api/system/checks');const overall=document.getElementById('overall');overall.textContent=body.status||'UNKNOWN';overall.className='overall mono '+(body.status||'WARN');const grid=document.getElementById('healthGrid');grid.innerHTML='';Object.entries(body.checks||{}).forEach(([name,c])=>{grid.innerHTML+=`<article class="card"><div class="card-head"><h3>${esc(name.replaceAll('_',' '))}</h3><span class="badge ${esc(c.status)}">${esc(c.status)}</span></div><div class="desc">${esc(c.summary)}</div></article>`});document.getElementById('diagnosticGrid').innerHTML=`<article class="card"><h3>Check Runtime</h3><div class="metric">${esc(body.duration_ms||0)} ms</div><div class="metric-label">Consolidated health evaluation</div></article><article class="card"><h3>Registered Checks</h3><div class="metric">${Object.keys(body.checks||{}).length}</div><div class="metric-label">Read-only operational checks</div></article>`}
let endpoints=[];function renderEndpoints(){const q=document.getElementById('endpointSearch').value.toLowerCase(),cat=document.getElementById('category').value;const rows=endpoints.filter(e=>(!cat||e.category===cat)&&(!q||e.route.toLowerCase().includes(q)||e.endpoint.toLowerCase().includes(q)));document.getElementById('endpointRows').innerHTML=rows.map(e=>`<tr><td>${e.methods.map(m=>`<span class="method">${esc(m)}</span>`).join('<br>')}</td><td><code>${esc(e.route)}</code></td><td>${esc(e.category)}</td><td>${esc(e.endpoint)}</td><td>${!e.dynamic&&e.methods.includes('GET')?`<button class="btn" onclick="probe('${esc(e.route)}',this)">Test</button>`:'—'}</td></tr>`).join('')}
async function loadEndpoints(){const {body}=await json('/api/endpoints');endpoints=body.endpoints||[];const cats=[...new Set(endpoints.map(x=>x.category))].sort();document.getElementById('category').innerHTML='<option value="">All categories</option>'+cats.map(x=>`<option>${esc(x)}</option>`).join('');renderEndpoints()}
async function probe(route,btn){btn.textContent='…';const started=performance.now();const r=await fetch(route);btn.textContent=`${r.status} · ${Math.round(performance.now()-started)}ms`;btn.className='btn '+(r.ok?'PASS':'WARN')}
async function optionalPanel(target,urls,waiting){for(const u of urls){const r=await json(u);if(r.status<500&&r.status!==404){document.getElementById(target).className='json';document.getElementById(target).textContent=JSON.stringify(r.body,null,2);return}}document.getElementById(target).className='empty';document.getElementById(target).textContent=waiting}
async function loadRelease(){const targets=[['Release','/api/system/release'],['Readiness','/api/system/readiness'],['Integrity','/api/system/integrity'],['Metrics','/api/system/metrics']];const g=document.getElementById('releaseGrid');g.innerHTML='';for(const [title,url] of targets){const r=await json(url);g.innerHTML+=`<article class="card"><div class="card-head"><h3>${title}</h3><span class="badge ${r.status<400?'PASS':'WARN'}">HTTP ${r.status}</span></div><pre class="json">${esc(JSON.stringify(r.body,null,2))}</pre></article>`}}
document.getElementById('endpointSearch').oninput=renderEndpoints;document.getElementById('category').onchange=renderEndpoints;document.getElementById('refreshEndpoints').onclick=loadEndpoints;
loadHealth();loadEndpoints();loadRelease();optionalPanel('ledgerContent',['/api/recommendation-ledger/health','/api/recommendation-ledger/coverage'],'Recommendation ledger is not registered yet. This correctly remains BLOCKED until the immutable capture layer is deployed.');optionalPanel('calibrationContent',['/api/calibration/readiness','/api/learning/calibration'],'Calibration is collecting history or is not yet eligible. No confidence statistics will be fabricated.');setInterval(loadHealth,30000);
</script>
</body></html>
