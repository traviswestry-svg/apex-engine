<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX Production Governance</title><style>body{font-family:Arial,sans-serif;background:#0b1020;color:#e8edf7;margin:0;padding:24px}.wrap{max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.card{background:#151c31;border:1px solid #2a3555;border-radius:12px;padding:18px}.muted{color:#9ba8c5}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid #2a3555}.badge{padding:6px 10px;border-radius:999px;background:#303b5f}</style></head><body><main class="wrap"><h1>Production Governance Center</h1><p class="muted">Review, approval, manifest, and rollback preparation. Automatic deployment is disabled.</p><section class="grid"><div class="card"><small>Current Champion</small><h2 id="champion">—</h2></div><div class="card"><small>Pending Promotions</small><h2 id="pending">—</h2></div><div class="card"><small>Queued / Not Deployed</small><h2 id="queued">—</h2></div><div class="card"><small>Production Mutation</small><h2>DISABLED</h2></div></section><section class="card" style="margin-top:14px"><h2>Promotion Registry</h2><div style="overflow:auto"><table><thead><tr><th>Created</th><th>Status</th><th>Candidate</th><th>Proposed Version</th><th>Rollback Target</th></tr></thead><tbody id="body"></tbody></table></div></section></main><script>async function load(){const s=await fetch('/api/production/status').then(r=>r.json());const p=await fetch('/api/production/promotions').then(r=>r.json());document.getElementById('champion').textContent=(s.current_champion||{}).champion_version||'PRODUCTION_CURRENT';document.getElementById('pending').textContent=s.pending_count||0;document.getElementById('queued').textContent=s.queued_not_deployed||0;const rows=p.promotions||[];document.getElementById('body').innerHTML=rows.map(x=>`<tr><td>${x.created_at}</td><td><span class="badge">${x.status}</span></td><td>${x.candidate_id}</td><td>${x.proposed_version}</td><td>${x.rollback_target}</td></tr>`).join('')||'<tr><td colspan="5">No production promotion requests.</td></tr>'}load();</script></body></html>
