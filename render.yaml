services:
  - type: web
    name: apex-engine-3
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120"
    disk:
      name: apex-tracking-disk
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: POLYGON_API_KEY
        sync: false
      - key: QUANTDATA_API_KEY
        sync: false
      - key: BENZINGA_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ACCOUNT_SIZE
        value: "60000"
      - key: MAX_RISK_PER_TRADE
        value: "750"
      - key: MIN_FINAL_SCORE
        value: "78"
      - key: MIN_ALERT_SCORE
        value: "85"
      - key: PREBREAKOUT_DISTANCE_PCT
        value: "2.0"
      - key: SCAN_INTERVAL_SECONDS
        value: "300"
      - key: RUN_SCANNER_ON_IMPORT
        value: "true"
      - key: SEND_TELEGRAM
        value: "true"
      - key: SCAN_WORKERS
        value: "8"
      - key: BREAKER_MAX_FAILURES
        value: "3"
      - key: DB_PATH
        value: "/data/apex_tracking.db"
      - key: TRACKING_ENABLED
        value: "true"
      - key: TRACK_MAX_HOLD_DAYS
        value: "30"
      - key: TRACK_MIN_SAMPLE
        value: "10"
