services:
  - type: web
    name: apex-engine-3
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./start_render.sh"
    disk:
      name: apex-tracking-disk
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: POLYGON_API_KEY
        sync: false
      - key: QUANTDATA_API_KEY
        sync: false
      - key: BENZINGA_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ACCOUNT_SIZE
        value: "60000"
      - key: MAX_RISK_PER_TRADE
        value: "750"
      - key: MIN_FINAL_SCORE
        value: "78"
      - key: MIN_ALERT_SCORE
        value: "85"
      - key: PREBREAKOUT_DISTANCE_PCT
        value: "2.0"
      - key: SCAN_INTERVAL_SECONDS
        value: "300"
      - key: RUN_SCANNER_ON_IMPORT
        value: "false"
      - key: APEX_PERSISTENT_DISK_PATH
        value: "/data"
      - key: RENDER_DISK_PATH
        value: "/data"
      - key: APEX_SCANNER_LEASE_PATH
        value: "/data/apex_scanner.lock"
      - key: APEX_SCANNER_HEARTBEAT_PATH
        value: "/data/scanner_heartbeat.json"
      - key: APEX_SIMILARITY_DB
        value: "/data/apex_similarity.db"
      - key: APEX_GOVERNANCE_DB
        value: "/data/apex_governance.db"
      - key: APEX_MARKET_MEMORY_DB
        value: "/data/apex_market_memory.db"
      - key: APEX_EVIDENCE_DB
        value: "/data/apex_evidence.db"
      - key: APEX_RESEARCH_DB
        value: "/data/apex_research.db"
      - key: APEX_SQLITE_TIMEOUT_SECONDS
        value: "15"
      - key: APEX_DISK_WARN_FREE_PCT
        value: "15"
      - key: APEX_DISK_CRITICAL_FREE_PCT
        value: "7"
      - key: SEND_TELEGRAM
        value: "true"
      - key: SCAN_WORKERS
        value: "8"
      - key: BREAKER_MAX_FAILURES
        value: "3"
      - key: DB_PATH
        value: "/data/apex_tracking.db"
      - key: TRACKING_ENABLED
        value: "true"
      - key: TRACK_MAX_HOLD_DAYS
        value: "30"
      - key: TRACK_MIN_SAMPLE
        value: "10"
